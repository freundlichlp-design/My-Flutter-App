name: kali_chat
description: "Kali Chat — KI-Chat-App mit Multi-Provider-Support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  get_it: ^8.0.2

  # Networking
  http: ^1.2.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.8.1

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.7

  # UI
  flutter_markdown: ^0.6.18
  flutter_highlight: ^0.7.0
  url_launcher: ^6.2.3

  # Voice & Media
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  image_picker: ^1.1.2

  # Utilities
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
